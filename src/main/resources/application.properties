spring.application.name=AdvancedCrud

spring.docker.compose.enabled=false

jwt.private-key=classpath:keys/private.pem
jwt.public-key=classpath:keys/public.pem
jwt.issuer=advanced-crud-api
jwt.access-token-ttl-minutes=15

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.datasource.url=jdbc:postgresql://localhost:9876/mydatabase
spring.datasource.username=myuser
spring.datasource.password=secret

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=redisPassword

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=rabbitUser
spring.rabbitmq.password=rabbitPassword
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.multiplier=2
spring.rabbitmq.listener.simple.retry.max-interval=10000
spring.rabbitmq.listener.simple.default-requeue-rejected=false

management.server.port=8081
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.health.redis.enabled=true
management.health.rabbit.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true

resilience4j.circuitbreaker.instances.viacep.ignore-exceptions=com.caique.advancedcrud.shared.exceptions.CepNotFoundException
resilience4j.circuitbreaker.instances.viacep.sliding-window-size=10
resilience4j.circuitbreaker.instances.viacep.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.viacep.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.viacep.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.viacep.permitted-number-of-calls-in-half-open-state=2

resilience4j.retry.instances.viacep.ignore-exceptions=com.caique.advancedcrud.shared.exceptions.CepNotFoundException
resilience4j.retry.instances.viacep.max-attempts=3
resilience4j.retry.instances.viacep.wait-duration=500ms
resilience4j.retry.instances.viacep.enable-exponential-backoff=true
resilience4j.retry.instances.viacep.exponential-backoff-multiplier=2